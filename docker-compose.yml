services:
  db:
    image: mysql:8.0
    container_name: db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: auth_db
      MYSQL_USER: user
      MYSQL_PASSWORD: password
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    command: --default-authentication-plugin=mysql_native_password

  redis:
    image: redis:7-alpine
    container_name: redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  mailpit:
    image: axllent/mailpit
    container_name: mailpit
    ports:
      - "1025:1025"
      - "8025:8025"
    volumes:
      - mailpit_data:/data
    environment:
      - MP_DATA_FILE=/data/mailpit.db
    restart: unless-stopped

  backend:
    build:
      context: ../backend
    container_name: backend
    working_dir: /app
    volumes:
      - ../backend:/app
    ports:
      - "8080:8080"
    environment:
      - DOTNET_USE_POLLING_FILE_WATCHER=true
      - ConnectionStrings__Default=Server=db;Port=3306;Database=lingua_sync;User=root;Password=${MYSQL_ROOT_PASSWORD};
      - Jwt__Secret=${JWT_SECRET}
      - Redis__Connection=redis:6379
      - Smtp__Host=mailpit
      - Smtp__Port=1025
      - Smtp__FromEmail=noreply@linguasync.com
      - Smtp__FromName=noreply
    command: dotnet watch run --urls=http://0.0.0.0:8080
    depends_on:
      - db
      - redis
      - mailpit
  
  batch:
    build:
      context: ../batch
    container_name: batch
    working_dir: /app
    volumes:
      - ../batch:/app
    ports:
      - "8080:8080"
    environment:
      - DOTNET_USE_POLLING_FILE_WATCHER=true
      - ConnectionStrings__Default=Server=db;Port=3306;Database=lingua_sync;User=root;Password=${MYSQL_ROOT_PASSWORD};
      - Jwt__Secret=${JWT_SECRET}
      - Redis__Connection=redis:6379
      - Smtp__Host=mailpit
      - Smtp__Port=1025
      - Smtp__FromEmail=noreply@linguasync.com
      - Smtp__FromName=noreply
    command: dotnet watch run --urls=http://0.0.0.0:8080
    depends_on:
      - db
      - redis
      - mailpit    

volumes:
  mysql_data:
  redis_data:
  mailpit_data:
