services:
  db:
    image: mysql:8.0
    container_name: db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: auth_db
      MYSQL_USER: user
      MYSQL_PASSWORD: password
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    command: --default-authentication-plugin=mysql_native_password

  redis:
    image: redis:7-alpine
    container_name: redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  mailpit:
    image: axllent/mailpit
    container_name: mailpit
    ports:
      - "1025:1025"
      - "8025:8025"
    volumes:
      - mailpit_data:/data
    environment:
      - MP_DATA_FILE=/data/mailpit.db
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    container_name: minio
    restart: always
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    ports:
      - "9000:9000"
      - "9001:9001"
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data

  backend:
    build:
      context: ../backend
    container_name: backend
    working_dir: /app
    volumes:
      - ../backend:/app
    ports:
      - "8080:8080"
    environment:
      - DOTNET_USE_POLLING_FILE_WATCHER=true
      - ConnectionStrings__Default=Server=db;Port=3306;Database=lingua_sync;User=root;Password=${MYSQL_ROOT_PASSWORD};
      - Jwt__Secret=${JWT_SECRET}
      - Redis__Connection=redis:6379
      - Smtp__Host=mailpit
      - Smtp__Port=1025
      - Smtp__FromEmail=noreply@linguasync.com
      - Smtp__FromName=noreply
    command: dotnet watch run --urls=http://0.0.0.0:8080
    depends_on:
      - db
      - redis
      - mailpit
  
  batch:
    build:
      context: ../batch
    container_name: batch
    working_dir: /app
    volumes:
      - ../batch:/app
    environment:
      - APP_ENV=development
      - DB_HOST=db
      - DB_PORT=3306
      - DB_NAME=lingua_sync
      - DB_USER=root
      - DB_PASSWORD=${MYSQL_ROOT_PASSWORD}
      - SMTP_HOST=mailpit
      - SMTP_PORT=1025
      - SMTP_FROM_EMAIL=noreply@linguasync.com
      - SMTP_FROM_NAME=noreply
      - LOG_LEVEL=INFO
      - MINIO_ROOT_USER=${MINIO_ROOT_USER}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD}
    command: sh -c "python scripts/register_cron.py && cron -f"
    depends_on:
      - db
      - mailpit
      - minio   

volumes:
  mysql_data:
  redis_data:
  mailpit_data:
  minio_data:
